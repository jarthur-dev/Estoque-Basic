<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque de Produtos</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-light py-5">

    <div class="container">
        
        <div class="card border-0 shadow-sm rounded-4 p-4">
            <div class="card-body">
                
                <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
                    <div>
                        <h2 class="fw-bold h3 text-dark mb-1">
                            <i class="bi bi-grid-3x3-gap-fill text-primary me-2"></i>Controle de Estoque
                        </h2>
                        <p class="text-muted small mb-0">Lista de mercadorias atualizadas em tempo real</p>
                    </div>
                    
                    <div class="d-flex align-items-center gap-3">
                        <select id="filtroOrdem" class="form-select filtro-ordem-btn fw-semibold px-6 py-2 rounded-4 text-secondary" onchange="ordenarERenderizar()">
                            <option value="cadastro">Ordem de cadastro (Padrão)</option>
                            <option value="nome-az">Nome (A - Z)</option>
                            <option value="nome-za">Nome (Z - A)</option>
                            <option value="preco-menor">Preço: Mais barato</option>
                            <option value="preco-maior">Preço: Mais caro</option>
                            <option value="qtd-maior">Quantidade: Maior estoque</option>
                            <option value="qtd-menor">Quantidade: Menor estoque</option>
                        </select>

                        <a href="cadastro.html" class="btn btn-success fw-semibold px-6 py-2 rounded-4 d-inline-flex align-items-center">
                            <i class="bi bi-plus-lg me-2"></i>Novo
                        </a>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th class="ps-3">ID</th>
                                <th>Nome</th>
                                <th>Categoria</th>
                                <th class="text-center">Qtd</th>
                                <th class="text-end">Preço Unitário</th>
                                <th class="text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="listaProdutos"></tbody>
                    </table>
                </div>

                <div id="alertaVazio" class="text-center py-4 d-none">
                    <i class="bi bi-inbox text-muted display-4"></i>
                    <p class="text-muted mt-2">Nenhum produto encontrado no banco.</p>
                </div>

            </div>
        </div>
    </div>

<script src="js/script.js"></script>

</body>
</html>
